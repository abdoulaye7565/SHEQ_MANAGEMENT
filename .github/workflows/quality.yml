name: Quality

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Compile
        run: python -m compileall -q app main.py mobile_app.py
      - name: Lint critical errors
        run: ruff check app main.py mobile_app.py
      - name: Tests
        run: python -m unittest discover -s tests -v
      - name: Validate release policy
        run: python scripts/validate_release.py
